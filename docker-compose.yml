services:
  # Shared Postgres instance — used by both prod and dev.
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: radiocalico
      POSTGRES_USER: radiocalico
      POSTGRES_PASSWORD: radiocalico
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radiocalico"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Express API — internal only; nginx proxies /api/* to it on port 3000.
  app:
    build:
      context: .
      target: prod
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://radiocalico:radiocalico@postgres:5432/radiocalico
    restart: unless-stopped

  # nginx — public-facing; serves static files and proxies API calls to app.
  # Usage: docker compose up [-d]
  nginx:
    build:
      context: .
      target: nginx
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - app
    restart: unless-stopped

  # Development — source bind-mounted for hot-reload via nodemon.
  # nginx is not used in dev; the app port is exposed directly for simplicity.
  # Usage: docker compose --profile dev up dev
  dev:
    build:
      context: .
      target: dev
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules   # keeps container-compiled modules from being overwritten by host
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://radiocalico:radiocalico@postgres:5432/radiocalico
    profiles:
      - dev

volumes:
  db-data:
