services:
  # Shared Postgres instance — used by both prod and dev.
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: radiocalico
      POSTGRES_USER: radiocalico
      POSTGRES_PASSWORD: radiocalico
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radiocalico"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Production — self-contained image, DB persisted in a named volume.
  # Usage: docker compose up [-d]
  prod:
    build:
      context: .
      target: prod
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://radiocalico:radiocalico@postgres:5432/radiocalico
    restart: unless-stopped

  # Development — source bind-mounted for hot-reload via nodemon.
  # Usage: docker compose --profile dev up dev
  dev:
    build:
      context: .
      target: dev
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules   # keeps container-compiled modules from being overwritten by host
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://radiocalico:radiocalico@postgres:5432/radiocalico
    profiles:
      - dev

volumes:
  db-data:
