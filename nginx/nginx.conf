server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types        text/html text/css application/javascript application/json image/svg+xml;

    # ── Caching ─────────────────────────────────────────────────────────────
    # HTML: always revalidate so users see the latest version immediately
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # CSS + JS: cache for 1 day (filenames have no content hash)
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Images + fonts: cache for 1 week
    location ~* \.(png|jpg|jpeg|gif|ico|webp|svg|woff2|woff)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Serve static assets directly; fall back to index.html for any unknown path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API requests to the Express backend.
    location /api/ {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
